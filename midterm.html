<!DOCTYPE html>
<html>
<head>
    <title>Midterm Table</title>
    <style>
        table{
            width: 80%;
            border-collapse: collapse;
            margin: auto;
        }

        td, td{
            border: 3px solid orange;
            padding: 15px;
            text-align: center;
        }

        td{
            font-size: 28px;
            font-weight: bold;
        }

        .wage{
            color: orange;
            font-weight: bold;
        }
    </style>
</head>

<body>

<table>
    <tr>
        <td>NAME</td>
        <td>POSITION</td>
        <td>WAGE</td>
    </tr>

    <tr>
        <td>Emma Johnson</td>
        <td>Sales Associate</td>
        <td class="wage">$15.50 per hour</td>
    </tr>

    <tr>
        <td>Liam Thompson</td>
        <td>Customer Service Representative</td>
        <td class="wage">$14.75 per hour</td>
    </tr>

    <tr>
        <td>Olivia Rodriguez</td>
        <td>Marketing Coordinator</td>
        <td class="wage">$18.25 per hour</td>
    </tr>

    <tr>
        <td>Noah Smith</td>
        <td>IT Support Specialist</td>
        <td class="wage">$20.00 per hour</td>
    </tr>

    <tr>
        <td>Ava Davis</td>
        <td>Administrative Assistant</td>
        <td class="wage">$16.80 per hour</td>
    </tr>

</table>

</body>
</html>
